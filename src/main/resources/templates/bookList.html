<!doctype html>
<html lang="es" xmlns:th="https://www.thymeleaf.com">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <title>Biblioteca - Libros Disponibles</title>
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
    <style>
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
        }
        .table-container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .table thead {
            background: #343a40;
            color: white;
        }
        .btn-add {
            background: linear-gradient(135deg, #28a745, #20c997);
            border: none;
            color: white;
        }
        .btn-add:hover {
            background: linear-gradient(135deg, #20c997, #28a745);
            color: white;
        }
        .btn-edit {
            background: linear-gradient(135deg, #0dcaf0, #0d6efd);
            border: none;
        }
        .btn-edit:hover {
            background: linear-gradient(135deg, #0d6efd, #0dcaf0);
            color: white;
        }
        .btn-delete {
            background: linear-gradient(135deg, #ff6b6b, #dc3545);
            border: none;
        }
        .btn-delete:hover {
            background: linear-gradient(135deg, #dc3545, #ff6b6b);
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="#">
                <i class="fas fa-book me-2"></i>Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/"><i class="fas fa-home me-1"></i>Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active text-white" aria-current="page" href="available_books"><i class="fas fa-book-open me-1"></i>Libros Disponibles</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="my_books"><i class="fas fa-heart me-1"></i>Mis Libros</a>
                    </li>
                </ul>
                <div>
                    <a class="btn btn-primary" href="book_register"><i class="fas fa-plus me-1"></i>Registrar Libro</a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container my-5">
        <div class="text-center mb-4">
            <h2 class="fw-bold"><i class="fas fa-book-open text-primary me-2"></i>Libros Disponibles</h2>
            <p class="text-muted">Explora nuestra colección completa de libros</p>
        </div>
        
        <div class="table-container">
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th><i class="fas fa-hashtag me-1"></i>Id</th>
                        <th><i class="fas fa-book me-1"></i>Nombre</th>
                        <th><i class="fas fa-user me-1"></i>Autor</th>
                        <th><i class="fas fa-tag me-1"></i>Precio</th>
                        <th><i class="fas fa-cog me-1"></i>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="b : ${book}">
                        <td th:text="${b.id}"></td>
                        <td th:text="${b.name}"></td>
                        <td th:text="${b.author}"></td>
                        <td th:text="${'$' + b.price}"></td>
                        <td>
                            <a class="btn btn-add btn-sm text-white me-1" th:href="@{/mylist/{id}(id=${b.id})}">
                                <i class="fas fa-heart"></i> Agregar
                            </a>
                            <a class="btn btn-edit btn-sm text-white me-1" th:href="@{/editBook/{id}(id=${b.id})}">
                                <i class="fas fa-edit"></i>
                            </a>
                            <a class="btn btn-delete btn-sm text-white" th:href="@{/deleteBook/{id}(id=${b.id})}" onclick="return confirm('¿Estás seguro de eliminar este libro?')">
                                <i class="fas fa-trash"></i>
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
            
            <div th:if="${#lists.isEmpty(book)}" class="text-center py-5">
                <i class="fas fa-book fa-4x text-muted mb-3"></i>
                <p class="text-muted">No hay libros disponibles actualmente.</p>
                <a href="book_register" class="btn btn-primary">Agregar Primer Libro</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
