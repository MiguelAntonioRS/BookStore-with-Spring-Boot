<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <title>BookStore - Add Book</title>
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .form-container { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="form-container">
                    <div class="text-center mb-4">
                        <i class="fas fa-book fa-3x text-primary mb-3"></i>
                        <h2 class="fw-bold">Add New Book</h2>
                        <p class="text-muted">Add a new book to our collection</p>
                    </div>
                    
                    <form th:action="@{/save}" method="post">
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="fas fa-book me-1"></i>Book Name</label>
                            <input type="text" class="form-control form-control-lg" name="name" placeholder="e.g., Clean Code" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="fas fa-user me-1"></i>Author</label>
                            <input type="text" class="form-control form-control-lg" name="author" placeholder="e.g., Robert C. Martin" required>
                        </div>
                        
                        <div class="mb-4">
                            <label class="form-label fw-semibold"><i class="fas fa-tag me-1"></i>Price</label>
                            <input type="number" step="0.01" class="form-control form-control-lg" name="price" placeholder="e.g., 29.99" required>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i>Save Book</button>
                            <a href="available_books" class="btn btn-outline-secondary btn-lg"><i class="fas fa-arrow-left me-2"></i>Back to Books</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
