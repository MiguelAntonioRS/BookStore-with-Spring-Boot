<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.com">
<head></head>
<body>
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand text-white" href="/">
                <i class="fas fa-book me-2"></i>Biblioteca
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link text-white" href="/"><i class="fas fa-home me-1"></i>Inicio</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="available_books"><i class="fas fa-book-open me-1"></i>Libros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="my_books"><i class="fas fa-heart me-1"></i>Mis Libros</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white" href="book_register"><i class="fas fa-plus me-1"></i>Nuevo Libro</a>
                    </li>
                </ul>
                <div class="d-flex">
                    <div th:if="${session.username != null}">
                        <span class="text-white me-3"><i class="fas fa-user me-1"></i><span th:text="${session.username}"></span></span>
                        <a class="btn btn-outline-light" href="/logout"><i class="fas fa-sign-out-alt me-1"></i>Salir</a>
                    </div>
                    <div th:unless="${session.username != null}">
                        <a class="btn btn-outline-light me-2" href="login"><i class="fas fa-sign-in-alt me-1"></i>Entrar</a>
                        <a class="btn btn-primary" href="register"><i class="fas fa-user-plus me-1"></i>Registrarse</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>
</body>
</html>
