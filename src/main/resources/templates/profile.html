<!doctype html>
<html lang="en" xmlns:th="https://www.thymeleaf.org">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
    <title>BookStore - My Profile</title>
    <script src="https://kit.fontawesome.com/0faddc1af8.js" crossorigin="anonymous"></script>
    <style>
        body { background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); min-height: 100vh; }
        .profile-card { background: white; border-radius: 20px; padding: 40px; box-shadow: 0 15px 40px rgba(0,0,0,0.15); }
        .profile-avatar { width: 120px; height: 120px; background: linear-gradient(135deg, #4F46E5, #10B981); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 3rem; color: white; }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="profile-card">
                    <div class="text-center mb-4">
                        <div class="profile-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <h2 class="fw-bold">My Profile</h2>
                        <p class="text-muted">Manage your account information</p>
                    </div>
                    
                    <div th:if="${success}" class="alert alert-success" role="alert">
                        <i class="fas fa-check-circle me-2"></i><span th:text="${success}"></span>
                    </div>
                    
                    <form th:action="@{/profile/update}" method="post">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold"><i class="fas fa-user me-1"></i>Username</label>
                                <input type="text" class="form-control" th:value="${user.username}" disabled>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold"><i class="fas fa-envelope me-1"></i>Email</label>
                                <input type="email" class="form-control" name="email" th:value="${user.email}" required>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold"><i class="fas fa-user me-1"></i>First Name</label>
                                <input type="text" class="form-control" name="firstName" th:value="${user.firstName}">
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold"><i class="fas fa-user me-1"></i>Last Name</label>
                                <input type="text" class="form-control" name="lastName" th:value="${user.lastName}">
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold"><i class="fas fa-shield-alt me-1"></i>Role</label>
                            <input type="text" class="form-control" th:value="${user.role}" disabled>
                        </div>
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold"><i class="fas fa-calendar me-1"></i>Member Since</label>
                            <input type="text" class="form-control" th:value="${#temporals.format(user.createdAt, 'MMM dd, yyyy')}" disabled>
                        </div>
                        
                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-primary btn-lg"><i class="fas fa-save me-2"></i>Save Changes</button>
                            <a href="/" class="btn btn-outline-secondary btn-lg"><i class="fas fa-arrow-left me-2"></i>Back to Home</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
